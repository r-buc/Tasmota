name: Build_QEMU_ESP32

on:
  workflow_dispatch:      # Start a workflow manually
  push:
    branches: master
    paths-ignore:
    #- '.github/**'        # Ignore changes towards the .github directory
    - '**.md'             # Do not build if *.md files change
    - 'tasmota/berry/**'  # Ignore Berry examples
  pull_request:
    branches: master
    paths-ignore:
    #- '.github/**'
    - '**.md'
    - 'tasmota/berry/**'

# Ensures that only one deploy task per branch/environment will run at a time.
concurrency:
  group: qemu-${{ github.ref }}
  cancel-in-progress: true

# Espressif QEMU release used for the boot-smoke test.
# Binary asset naming: qemu-xtensa-softmmu-<VERSION_UNDERSCORED>-x86_64-linux-gnu.tar.xz
# Requires glibc >= 2.31; ubuntu-latest (24.04) ships glibc 2.39.
env:
  QEMU_RELEASE: esp-develop-9.2.2-20250228
  QEMU_VERSION: esp_develop_9.2.2_20250228

jobs:
  qemu-image:
    runs-on: ubuntu-latest
    if: github.repository == 'r-buc/Tasmota'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: false
      - name: Install dependencies
        run: |
          uv pip install --system -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip
          cp ./platformio_override_sample.ini ./platformio_override.ini
      - name: Run PlatformIO (safeboot)
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: '1'
        run: platformio run -e tasmota32-safeboot
      - name: Move safeboot files into place
        run: |
          mkdir -p ./firmware/firmware
          cp ./build_output/firmware/*.bin ./firmware/firmware/ 2>/dev/null || true
      - name: Run PlatformIO (tasmota32-qemu)
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: '1'
        run: platformio run -e tasmota32-qemu
      - name: Collect QEMU binaries and create flash image
        run: |
          BUILD_DIR=".pio/build/tasmota32-qemu"
          mkdir -p qemu_image

          # PlatformIO's post_esp32.py assembles firmware.factory.bin with the
          # correct partition layout:
          #   0x1000  - bootloader
          #   0x8000  - partition table
          #   0xe000  - boot_app0 (OTA data)
          #   0x10000 - safeboot firmware (factory partition)
          #   0xe0000 - main Tasmota firmware (app0 partition)
          #
          # QEMU's MTD flash device only accepts images of exactly 2, 4, 8, or
          # 16 MB.  Use dd with conv=sync to pad the factory image to exactly 4 MB.
          # Fail explicitly if the source already exceeds 4 MB (would be silently
          # truncated by dd otherwise).
          SRC="${BUILD_DIR}/firmware.factory.bin"
          SIZE=$(stat -c%s "$SRC")
          MAX=$((4 * 1024 * 1024))
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "ERROR: firmware.factory.bin ($SIZE bytes) exceeds 4 MB flash limit"
            exit 1
          fi
          dd if="$SRC" of="qemu_image/tasmota32-qemu-flash.bin" bs=4M count=1 conv=sync

          echo "=== QEMU flash image ==="
          ls -lh qemu_image/
      - name: Install Espressif QEMU
        run: |
          # Install runtime libraries required by the Espressif QEMU binary.
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-0 libpixman-1-0 libsdl2-2.0-0 libslirp0

          # Download the pre-built xtensa-softmmu binary from the official
          # Espressif QEMU release.  The archive extracts to qemu/bin/qemu-system-xtensa.
          curl -L -o /tmp/qemu-esp32.tar.xz \
            "https://github.com/espressif/qemu/releases/download/${{ env.QEMU_RELEASE }}/qemu-xtensa-softmmu-${{ env.QEMU_VERSION }}-x86_64-linux-gnu.tar.xz"
          tar -xf /tmp/qemu-esp32.tar.xz -C /tmp
          echo "/tmp/qemu/bin" >> "$GITHUB_PATH"

          /tmp/qemu/bin/qemu-system-xtensa --version
      - name: Boot and network test in QEMU
        run: |
          echo "Starting Tasmota in QEMU with user-mode networking..."

          # Run QEMU in the background.
          # -nographic         : headless – no graphical display
          # -machine esp32     : Espressif ESP32 dual-core Xtensa LX6 machine
          # -drive ...         : attach the factory flash image as MTD flash
          # -nic user,...      : SLIRP user-mode networking routed through the
          #                      OpenCores Ethernet MAC (open_eth).
          #                      hostfwd forwards host TCP:18080 → guest TCP:80
          # -serial file       : capture UART0 for log analysis
          qemu-system-xtensa \
            -nographic \
            -machine esp32 \
            -drive "file=qemu_image/tasmota32-qemu-flash.bin,if=mtd,format=raw" \
            -nic user,model=open_eth,hostfwd=tcp::18080-:80 \
            -serial file:qemu_serial.log \
            -monitor null \
            2>/dev/null &
          QEMU_PID=$!
          echo "QEMU PID: $QEMU_PID"

          # --- Step 1: wait for Tasmota to reach main init (up to 60 s) ---
          echo "Waiting for Tasmota to reach main init..."
          TIMEOUT=60
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            if grep -q "Project tasmota" qemu_serial.log 2>/dev/null; then
              break
            fi
            sleep 2
            ELAPSED=$((ELAPSED + 2))
          done

          if ! grep -q "Project tasmota" qemu_serial.log 2>/dev/null; then
            echo "✗ Boot test FAILED – 'Project tasmota' not found after ${TIMEOUT}s"
            kill "$QEMU_PID" 2>/dev/null || true
            cat qemu_serial.log || true
            exit 1
          fi
          echo "✓ Boot PASSED – Tasmota reached main init"

          # --- Step 2: wait for Ethernet to get an IP address (up to 60 s) ---
          # Tasmota logs "ETH: Connected" when the link comes up and
          # "ETH: IPv4" / "ETH: Got IP" when DHCP assigns an address.
          echo "Waiting for Ethernet IP address..."
          TIMEOUT=60
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            if grep -qE "ETH:.*[Cc]onnected|ETH:.*IPv4|ETH:.*[Gg]ot.IP" qemu_serial.log 2>/dev/null; then
              break
            fi
            sleep 2
            ELAPSED=$((ELAPSED + 2))
          done

          if ! grep -qE "ETH:.*[Cc]onnected|ETH:.*IPv4|ETH:.*[Gg]ot.IP" qemu_serial.log 2>/dev/null; then
            echo "✗ Network test FAILED – Ethernet did not come up after ${TIMEOUT}s"
            kill "$QEMU_PID" 2>/dev/null || true
            cat qemu_serial.log || true
            exit 1
          fi
          echo "✓ Ethernet is up"

          # Give the web server a moment to start accepting connections.
          sleep 5

          # --- Step 3: HTTP reachability – run Status 0 command via HTTP ---
          echo "Testing HTTP reachability via Status 0 command..."
          HTTP_CODE=$(curl -s \
            --max-time 15 \
            -o /tmp/status_response.json \
            -w "%{http_code}" \
            "http://localhost:18080/cm?cmnd=Status%200" || echo "000")

          echo "HTTP response code: $HTTP_CODE"
          echo "HTTP response body:"
          cat /tmp/status_response.json || true
          echo ""

          if [ "$HTTP_CODE" != "200" ]; then
            echo "✗ HTTP test FAILED – expected 200, got $HTTP_CODE"
            kill "$QEMU_PID" 2>/dev/null || true
            cat qemu_serial.log || true
            exit 1
          fi

          if ! grep -q '"Status"' /tmp/status_response.json 2>/dev/null; then
            echo "✗ HTTP test FAILED – response does not contain expected JSON key 'Status'"
            kill "$QEMU_PID" 2>/dev/null || true
            cat qemu_serial.log || true
            exit 1
          fi

          echo "✓ HTTP test PASSED – Tasmota responded to Status 0 with HTTP 200"
          kill "$QEMU_PID" 2>/dev/null || true

          echo ""
          echo "--- QEMU serial output (last 60 lines) ---"
          tail -60 qemu_serial.log || true
      - name: Zip QEMU image
        run: |
          cd qemu_image
          zip ../tasmota-qemu-esp32-image.zip ./*
      - name: Upload QEMU image artifact
        uses: actions/upload-artifact@v4
        with:
          name: tasmota-qemu-esp32-image
          path: tasmota-qemu-esp32-image.zip
  Release:
    needs: [qemu-image]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4
    - name: Download all Tasmota artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: tasmota*
        path: ./temp
    - name: Move files
      run: |
        mkdir -p ./release
        find ./temp -type f -exec cp -t ./release {} +
    - name: Display structure of downloaded files
      run: ls -R ./release/
    - name: Release
      uses: jason2866/action-gh-release@v1.2
      with:
        tag_name: ${{ github.run_number }}
        files: |
          ./release/tasmota*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

