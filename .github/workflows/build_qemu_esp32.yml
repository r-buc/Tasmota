name: Build_QEMU_ESP32

on:
  workflow_dispatch:      # Start a workflow manually
  push:
    branches: master
    paths-ignore:
    #- '.github/**'        # Ignore changes towards the .github directory
    - '**.md'             # Do not build if *.md files change
    - 'tasmota/berry/**'  # Ignore Berry examples
  pull_request:
    branches: master
    paths-ignore:
    #- '.github/**'
    - '**.md'
    - 'tasmota/berry/**'

# Ensures that only one deploy task per branch/environment will run at a time.
concurrency:
  group: qemu-${{ github.ref }}
  cancel-in-progress: true

# Espressif QEMU release used for the boot-smoke test.
# Binary asset naming: qemu-xtensa-softmmu-<VERSION_UNDERSCORED>-x86_64-linux-gnu.tar.xz
# Requires glibc >= 2.31; ubuntu-latest (24.04) ships glibc 2.39.
env:
  QEMU_RELEASE: esp-develop-9.2.2-20250817
  QEMU_VERSION: esp_develop_9.2.2_20250817
jobs:
  build:
    runs-on: ubuntu-latest
    if: github.repository == 'r-buc/Tasmota'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: false
      - name: Install dependencies
        run: |
          uv pip install --system -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip
          cp ./platformio_override_sample.ini ./platformio_override.ini
      - name: Run PlatformIO (safeboot)
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: '1'
        run: platformio run -e tasmota32-qemu-safeboot
      - name: Move safeboot files into place
        run: |
          mkdir -p ./firmware/firmware
          cp ./build_output/firmware/*.bin ./firmware/firmware/ 2>/dev/null || true
      - name: Run PlatformIO (tasmota32-qemu)
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: '1'
        run: platformio run -e tasmota32-qemu
      - name: Collect QEMU binaries and create flash image
        run: |
          BUILD_DIR=".pio/build/tasmota32-qemu"
          mkdir -p qemu_image

          # PlatformIO's post_esp32.py assembles firmware.factory.bin with the
          # correct partition layout:
          #   0x1000  - bootloader
          #   0x8000  - partition table
          #   0xe000  - boot_app0 (OTA data)
          #   0x10000 - safeboot firmware (factory partition)
          #   0xe0000 - main Tasmota firmware (app0 partition)
          #
          # QEMU's MTD flash device only accepts images of exactly 2, 4, 8, or
          # 16 MB.  Use dd with conv=sync to pad the factory image to exactly 4 MB.
          # Fail explicitly if the source already exceeds 4 MB (would be silently
          # truncated by dd otherwise).
          SRC="${BUILD_DIR}/firmware.factory.bin"
          SIZE=$(stat -c%s "$SRC")
          MAX=$((4 * 1024 * 1024))
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "ERROR: firmware.factory.bin ($SIZE bytes) exceeds 4 MB flash limit"
            exit 1
          fi
          dd if="$SRC" of="qemu_image/tasmota32-qemu-flash.bin" bs=4M count=1 conv=sync

          echo "=== QEMU flash image ==="
          ls -lh qemu_image/
      - name: Zip QEMU image
        run: |
          cd qemu_image
          zip ../tasmota-qemu-esp32-image.zip ./*
      - name: Upload QEMU image artifact
        uses: actions/upload-artifact@v4
        with:
          name: tasmota-qemu-esp32-image
          path: tasmota-qemu-esp32-image.zip

  test:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.repository == 'r-buc/Tasmota'
    permissions:
      contents: read
    steps:
      - name: Install Espressif QEMU
        run: |
          # Install runtime libraries required by the Espressif QEMU binary.
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-0 libpixman-1-0 libsdl2-2.0-0 libslirp0

          # Download the pre-built xtensa-softmmu binary from the official
          # Espressif QEMU release.  The archive extracts to qemu/bin/qemu-system-xtensa.
          curl -L -o /tmp/qemu-esp32.tar.xz \
            "https://github.com/espressif/qemu/releases/download/${{ env.QEMU_RELEASE }}/qemu-xtensa-softmmu-${{ env.QEMU_VERSION }}-x86_64-linux-gnu.tar.xz"
          tar -xJf /tmp/qemu-esp32.tar.xz -C /tmp
          echo "/tmp/qemu/bin" >> "$GITHUB_PATH"

          /tmp/qemu/bin/qemu-system-xtensa --version
      - name: Download QEMU flash image
        uses: actions/download-artifact@v4
        with:
          name: tasmota-qemu-esp32-image
          path: .
      - name: Unzip QEMU image
        run: |
          mkdir -p qemu_image
          unzip tasmota-qemu-esp32-image.zip -d qemu_image
          ls -lh qemu_image/
      - name: Boot and network test in QEMU
        run: |
          # Helper: run one QEMU boot, wait for boot+ethernet, run an HTTP check.
          # Usage: run_qemu_boot <boot_number> <log_file> <host_port>
          run_qemu_boot() {
            local BOOT_NUM="$1"
            local LOG="$2"
            local PORT="$3"

            echo ""
            echo "=== Boot $BOOT_NUM ==="
            > "$LOG"

            qemu-system-xtensa \
              -nographic \
              -machine esp32 \
              -drive "file=qemu_image/tasmota32-qemu-flash.bin,if=mtd,format=raw" \
              -nic user,model=open_eth,hostfwd=tcp::${PORT}-:80 \
              -serial file:"$LOG" \
              -monitor null \
              2>/dev/null &
            local QEMU_PID=$!
            echo "QEMU PID: $QEMU_PID"

            # Wait for Tasmota main init (up to 60 s).
            local TIMEOUT=60 ELAPSED=0
            while [ $ELAPSED -lt $TIMEOUT ]; do
              grep -q "Project tasmota" "$LOG" 2>/dev/null && break
              sleep 2; ELAPSED=$((ELAPSED + 2))
            done
            if ! grep -q "Project tasmota" "$LOG" 2>/dev/null; then
              echo "✗ Boot $BOOT_NUM FAILED – 'Project tasmota' not found after ${TIMEOUT}s"
              kill "$QEMU_PID" 2>/dev/null || true
              cat "$LOG" || true
              return 1
            fi
            echo "✓ Boot $BOOT_NUM – Tasmota reached main init"

            # Wait for Ethernet (up to 60 s).
            TIMEOUT=60; ELAPSED=0
            while [ $ELAPSED -lt $TIMEOUT ]; do
              grep -qE "ETH:.*[Cc]onnected|ETH:.*IPv4|ETH:.*[Gg]ot.IP" "$LOG" 2>/dev/null && break
              sleep 2; ELAPSED=$((ELAPSED + 2))
            done
            if ! grep -qE "ETH:.*[Cc]onnected|ETH:.*IPv4|ETH:.*[Gg]ot.IP" "$LOG" 2>/dev/null; then
              echo "✗ Boot $BOOT_NUM FAILED – Ethernet did not come up after ${TIMEOUT}s"
              kill "$QEMU_PID" 2>/dev/null || true
              cat "$LOG" || true
              return 1
            fi
            echo "✓ Boot $BOOT_NUM – Ethernet is up"

            # HTTP reachability check (only on the first boot where we set up the port).
            if [ "$BOOT_NUM" -eq 1 ]; then
              sleep 5
              echo "Testing HTTP reachability via Status 0 command..."
              local HTTP_CODE
              HTTP_CODE=$(curl -s \
                --max-time 15 \
                -o /tmp/status_response.json \
                -w "%{http_code}" \
                "http://localhost:${PORT}/cm?cmnd=Status%200" || echo "000")
              echo "HTTP response code: $HTTP_CODE"
              cat /tmp/status_response.json || true
              echo ""
              if [ "$HTTP_CODE" != "200" ]; then
                echo "✗ Boot $BOOT_NUM HTTP test FAILED – expected 200, got $HTTP_CODE"
                kill "$QEMU_PID" 2>/dev/null || true
                cat "$LOG" || true
                return 1
              fi
              if ! grep -q '"Status"' /tmp/status_response.json 2>/dev/null; then
                echo "✗ Boot $BOOT_NUM HTTP test FAILED – response missing 'Status' key"
                kill "$QEMU_PID" 2>/dev/null || true
                cat "$LOG" || true
                return 1
              fi
              echo "✓ Boot $BOOT_NUM – HTTP Status 0 returned HTTP 200"
            fi

            kill "$QEMU_PID" 2>/dev/null || true
            echo "--- Serial output boot $BOOT_NUM (last 40 lines) ---"
            tail -40 "$LOG" || true
            return 0
          }

          # Boot 1: first-time boot (fresh flash image, no saved config).
          run_qemu_boot 1 qemu_serial_1.log 18080 || exit 1

          # Boot 2: second boot with saved config — the scenario that previously
          # triggered the crash loop (WT32_ETH01 PHY type corruption on flash write).
          run_qemu_boot 2 qemu_serial_2.log 18081 || exit 1

          echo ""
          echo "✓ All required boot tests passed"
      - name: Stress test – 5 consecutive boots
        run: |
          # Run QEMU 5 more times to confirm the fix holds across repeated boots.
          # Each iteration reuses the same (already-written) flash image so any
          # persistent flash corruption or PHY-type regression would surface here.
          STRESS_BOOTS=5
          FAILED=0

          for i in $(seq 3 $((2 + STRESS_BOOTS))); do
            PORT=$((18080 + i - 1))
            LOG="qemu_serial_${i}.log"

            echo ""
            echo "=== Stress boot $i / $((2 + STRESS_BOOTS)) ==="
            > "$LOG"

            qemu-system-xtensa \
              -nographic \
              -machine esp32 \
              -drive "file=qemu_image/tasmota32-qemu-flash.bin,if=mtd,format=raw" \
              -nic user,model=open_eth,hostfwd=tcp::${PORT}-:80 \
              -serial file:"$LOG" \
              -monitor null \
              2>/dev/null &
            QEMU_PID=$!

            # Wait for boot (up to 60 s).
            TIMEOUT=60; ELAPSED=0
            while [ $ELAPSED -lt $TIMEOUT ]; do
              grep -q "Project tasmota" "$LOG" 2>/dev/null && break
              sleep 2; ELAPSED=$((ELAPSED + 2))
            done
            BOOT_OK=0
            if grep -q "Project tasmota" "$LOG" 2>/dev/null; then
              # Wait for Ethernet (up to 60 s).
              TIMEOUT=60; ELAPSED=0
              while [ $ELAPSED -lt $TIMEOUT ]; do
                grep -qE "ETH:.*[Cc]onnected|ETH:.*IPv4|ETH:.*[Gg]ot.IP" "$LOG" 2>/dev/null && break
                sleep 2; ELAPSED=$((ELAPSED + 2))
              done
              if grep -qE "ETH:.*[Cc]onnected|ETH:.*IPv4|ETH:.*[Gg]ot.IP" "$LOG" 2>/dev/null; then
                BOOT_OK=1
              fi
            fi

            kill "$QEMU_PID" 2>/dev/null || true

            if [ "$BOOT_OK" -eq 1 ]; then
              echo "✓ Stress boot $i passed"
              tail -20 "$LOG" || true
            else
              echo "✗ Stress boot $i FAILED"
              cat "$LOG" || true
              FAILED=$((FAILED + 1))
            fi
          done

          if [ "$FAILED" -gt 0 ]; then
            echo ""
            echo "✗ Stress test FAILED: $FAILED / $STRESS_BOOTS boots did not reach the network"
            exit 1
          fi
          echo ""
          echo "✓ Stress test PASSED: all $STRESS_BOOTS consecutive boots reached the network"
      - name: Upload QEMU serial logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-serial-logs
          path: qemu_serial_*.log

  Release:
    needs: [test]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4
    - name: Download all Tasmota artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: tasmota*
        path: ./temp
    - name: Move files
      run: |
        mkdir -p ./release
        find ./temp -type f -exec cp -t ./release {} +
    - name: Display structure of downloaded files
      run: ls -R ./release/
    - name: Release
      uses: jason2866/action-gh-release@v1.2
      with:
        tag_name: ${{ github.run_number }}
        files: |
          ./release/tasmota*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

