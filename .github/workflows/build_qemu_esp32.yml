name: Build_QEMU_ESP32

on:
  workflow_dispatch:      # Start a workflow manually
  push:
    branches: master
    paths-ignore:
    #- '.github/**'        # Ignore changes towards the .github directory
    - '**.md'             # Do not build if *.md files change
    - 'tasmota/berry/**'  # Ignore Berry examples
  pull_request:
    branches: master
    paths-ignore:
    #- '.github/**'
    - '**.md'
    - 'tasmota/berry/**'

# Ensures that only one deploy task per branch/environment will run at a time.
concurrency:
  group: qemu-${{ github.ref }}
  cancel-in-progress: true

# Espressif QEMU release used for the boot-smoke test.
# Binary asset naming: qemu-xtensa-softmmu-<VERSION_UNDERSCORED>-x86_64-linux-gnu.tar.xz
# Requires glibc >= 2.31; ubuntu-latest (24.04) ships glibc 2.39.
env:
  QEMU_RELEASE: esp-develop-9.2.2-20250817
  QEMU_VERSION: esp_develop_9.2.2_20250817
jobs:
  build:
    runs-on: ubuntu-latest
    if: github.repository == 'r-buc/Tasmota'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: false
      - name: Install dependencies
        run: |
          uv pip install --system -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip
          cp ./platformio_override_sample.ini ./platformio_override.ini
      - name: Run PlatformIO (safeboot)
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: '1'
        run: platformio run -e tasmota32-qemu-safeboot
      - name: Move safeboot files into place
        run: |
          mkdir -p ./firmware/firmware
          cp ./build_output/firmware/*.bin ./firmware/firmware/ 2>/dev/null || true
      - name: Run PlatformIO (tasmota32-qemu)
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: '1'
        run: platformio run -e tasmota32-qemu
      - name: Collect QEMU binaries and create flash image
        run: |
          BUILD_DIR=".pio/build/tasmota32-qemu"
          mkdir -p qemu_image

          # PlatformIO's post_esp32.py assembles firmware.factory.bin with the
          # correct partition layout:
          #   0x1000  - bootloader
          #   0x8000  - partition table
          #   0xe000  - boot_app0 (OTA data)
          #   0x10000 - safeboot firmware (factory partition)
          #   0xe0000 - main Tasmota firmware (app0 partition)
          #
          # QEMU's MTD flash device only accepts images of exactly 2, 4, 8, or
          # 16 MB.  Use dd with conv=sync to pad the factory image to exactly 4 MB.
          # Fail explicitly if the source already exceeds 4 MB (would be silently
          # truncated by dd otherwise).
          SRC="${BUILD_DIR}/firmware.factory.bin"
          SIZE=$(stat -c%s "$SRC")
          MAX=$((4 * 1024 * 1024))
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "ERROR: firmware.factory.bin ($SIZE bytes) exceeds 4 MB flash limit"
            exit 1
          fi
          dd if="$SRC" of="qemu_image/tasmota32-qemu-flash.bin" bs=4M count=1 conv=sync

          # Also include the OTA-only application binary (no bootloader/partition
          # table) so the safeboot OTA test can upload it via the /u HTTP endpoint.
          cp "build_output/firmware/tasmota32-qemu.bin" qemu_image/

          echo "=== QEMU artifacts ==="
          ls -lh qemu_image/
      - name: Zip QEMU image
        run: |
          cd qemu_image
          zip ../tasmota-qemu-esp32-image.zip ./*
      - name: Upload QEMU image artifact
        uses: actions/upload-artifact@v4
        with:
          name: tasmota-qemu-esp32-image
          path: tasmota-qemu-esp32-image.zip

  test:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.repository == 'r-buc/Tasmota'
    permissions:
      contents: read
    steps:
      - name: Install Espressif QEMU
        run: |
          # Install runtime libraries required by the Espressif QEMU binary.
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-0 libpixman-1-0 libsdl2-2.0-0 libslirp0

          # Download the pre-built xtensa-softmmu binary from the official
          # Espressif QEMU release.  The archive extracts to qemu/bin/qemu-system-xtensa.
          curl -L -o /tmp/qemu-esp32.tar.xz \
            "https://github.com/espressif/qemu/releases/download/${{ env.QEMU_RELEASE }}/qemu-xtensa-softmmu-${{ env.QEMU_VERSION }}-x86_64-linux-gnu.tar.xz"
          tar -xJf /tmp/qemu-esp32.tar.xz -C /tmp
          echo "/tmp/qemu/bin" >> "$GITHUB_PATH"

          /tmp/qemu/bin/qemu-system-xtensa --version
      - name: Download QEMU flash image
        uses: actions/download-artifact@v4
        with:
          name: tasmota-qemu-esp32-image
          path: .
      - name: Unzip QEMU image
        run: |
          mkdir -p qemu_image
          unzip tasmota-qemu-esp32-image.zip -d qemu_image
          ls -lh qemu_image/

      # ------------------------------------------------------------------
      # Boot tests 1 & 2: power-cycle reboots
      # Boot 1 verifies first-time startup and HTTP reachability.
      # Boot 2 reuses the flash image (with saved config from boot 1) to
      # confirm the crash-loop regression is fixed.
      # ------------------------------------------------------------------
      - name: Boot test – power cycle (boots 1 & 2)
        run: |
          wait_for_pattern() {
            local LOG="$1" PAT="$2" TIMEOUT="${3:-60}" ELAPSED=0
            while [ $ELAPSED -lt $TIMEOUT ]; do
              grep -qE "$PAT" "$LOG" 2>/dev/null && return 0
              sleep 2; ELAPSED=$((ELAPSED + 2))
            done
            return 1
          }

          for BOOT_NUM in 1 2; do
            PORT=$((18079 + BOOT_NUM))
            LOG="qemu_serial_${BOOT_NUM}.log"
            echo ""; echo "=== Boot $BOOT_NUM (power cycle) ==="
            > "$LOG"

            qemu-system-xtensa \
              -nographic -machine esp32 \
              -drive "file=qemu_image/tasmota32-qemu-flash.bin,if=mtd,format=raw" \
              -nic user,model=open_eth,hostfwd=tcp::${PORT}-:80 \
              -serial file:"$LOG" -monitor null 2>/dev/null &
            QEMU_PID=$!

            if ! wait_for_pattern "$LOG" "Project tasmota"; then
              echo "✗ Boot $BOOT_NUM FAILED – 'Project tasmota' not found"
              kill "$QEMU_PID" 2>/dev/null || true; cat "$LOG"; exit 1
            fi
            echo "✓ Boot $BOOT_NUM – Tasmota reached main init"

            if ! wait_for_pattern "$LOG" "ETH:.*[Cc]onnected|ETH:.*IPv4|ETH:.*[Gg]ot.IP"; then
              echo "✗ Boot $BOOT_NUM FAILED – Ethernet did not come up"
              kill "$QEMU_PID" 2>/dev/null || true; cat "$LOG"; exit 1
            fi
            echo "✓ Boot $BOOT_NUM – Ethernet is up"

            # HTTP reachability check on boot 1 only.
            if [ "$BOOT_NUM" -eq 1 ]; then
              sleep 5
              HTTP_CODE=$(curl -s --max-time 15 \
                -o /tmp/status_b1.json -w "%{http_code}" \
                "http://localhost:${PORT}/cm?cmnd=Status%200" || echo "000")
              echo "HTTP code: $HTTP_CODE"; cat /tmp/status_b1.json || true; echo ""
              if [ "$HTTP_CODE" != "200" ] || ! grep -q '"Status"' /tmp/status_b1.json 2>/dev/null; then
                echo "✗ Boot 1 HTTP test FAILED (code=$HTTP_CODE)"
                kill "$QEMU_PID" 2>/dev/null || true; cat "$LOG"; exit 1
              fi
              echo "✓ Boot 1 – HTTP Status 0 returned 200"
            fi

            kill "$QEMU_PID" 2>/dev/null || true
            echo "--- Last 20 lines of serial log ---"
            tail -20 "$LOG" || true
          done
          echo ""; echo "✓ Power-cycle boot tests passed"

      # ------------------------------------------------------------------
      # Boot test 3: software restart via Tasmota HTTP command
      # Start one QEMU instance, wait for it to boot, then issue
      # "Restart 1" via HTTP.  The ESP32 resets internally (QEMU process
      # keeps running); detect the second boot in the same serial log.
      # ------------------------------------------------------------------
      - name: Boot test – software restart via Tasmota Restart 1 (boot 3)
        run: |
          echo "=== Boot 3 (software restart via HTTP 'Restart 1') ==="
          > qemu_serial_3.log

          qemu-system-xtensa \
            -nographic -machine esp32 \
            -drive "file=qemu_image/tasmota32-qemu-flash.bin,if=mtd,format=raw" \
            -nic user,model=open_eth,hostfwd=tcp::18082-:80 \
            -serial file:qemu_serial_3.log -monitor null 2>/dev/null &
          QEMU_PID=$!
          echo "QEMU PID: $QEMU_PID"

          # Wait for first boot.
          TIMEOUT=60; ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            grep -q "Project tasmota" qemu_serial_3.log 2>/dev/null && break
            sleep 2; ELAPSED=$((ELAPSED + 2))
          done
          if ! grep -q "Project tasmota" qemu_serial_3.log 2>/dev/null; then
            echo "✗ Boot 3 (1st) FAILED – 'Project tasmota' not found"
            kill "$QEMU_PID" 2>/dev/null || true; cat qemu_serial_3.log; exit 1
          fi
          TIMEOUT=60; ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            grep -qE "ETH:.*[Cc]onnected|ETH:.*IPv4|ETH:.*[Gg]ot.IP" qemu_serial_3.log 2>/dev/null && break
            sleep 2; ELAPSED=$((ELAPSED + 2))
          done
          if ! grep -qE "ETH:.*[Cc]onnected|ETH:.*IPv4|ETH:.*[Gg]ot.IP" qemu_serial_3.log 2>/dev/null; then
            echo "✗ Boot 3 (1st) FAILED – Ethernet not up"
            kill "$QEMU_PID" 2>/dev/null || true; cat qemu_serial_3.log; exit 1
          fi
          echo "✓ Boot 3 (1st) – Tasmota running with Ethernet"

          # Record log position then trigger software restart.
          sleep 3
          LINES_BEFORE=$(wc -l < qemu_serial_3.log)
          echo "Log lines before restart: $LINES_BEFORE"
          echo "Sending 'Restart 1' via HTTP..."
          curl -s --max-time 10 "http://localhost:18082/cm?cmnd=Restart%201" || true

          # The QEMU process stays alive; wait for a second 'Project tasmota'
          # that appears after LINES_BEFORE in the continuing serial log.
          echo "Waiting for Tasmota to reboot..."
          TIMEOUT=90; ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            tail -n +$((LINES_BEFORE + 1)) qemu_serial_3.log 2>/dev/null \
              | grep -q "Project tasmota" && break
            sleep 2; ELAPSED=$((ELAPSED + 2))
          done
          if ! tail -n +$((LINES_BEFORE + 1)) qemu_serial_3.log 2>/dev/null \
               | grep -q "Project tasmota"; then
            echo "✗ Boot 3 – Tasmota did not reboot after Restart 1"
            kill "$QEMU_PID" 2>/dev/null || true; cat qemu_serial_3.log; exit 1
          fi
          echo "✓ Boot 3 – Tasmota rebooted (software restart)"

          # Wait for Ethernet after the software restart.
          TIMEOUT=60; ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            tail -n +$((LINES_BEFORE + 1)) qemu_serial_3.log 2>/dev/null \
              | grep -qE "ETH:.*[Cc]onnected|ETH:.*IPv4|ETH:.*[Gg]ot.IP" && break
            sleep 2; ELAPSED=$((ELAPSED + 2))
          done
          if ! tail -n +$((LINES_BEFORE + 1)) qemu_serial_3.log 2>/dev/null \
               | grep -qE "ETH:.*[Cc]onnected|ETH:.*IPv4|ETH:.*[Gg]ot.IP"; then
            echo "✗ Boot 3 – Ethernet not up after software restart"
            kill "$QEMU_PID" 2>/dev/null || true; cat qemu_serial_3.log; exit 1
          fi
          echo "✓ Boot 3 – Ethernet up after software restart"

          kill "$QEMU_PID" 2>/dev/null || true
          echo "--- Last 20 lines of serial log ---"
          tail -20 qemu_serial_3.log || true
          echo ""; echo "✓ Software restart test passed"

      # ------------------------------------------------------------------
      # Stress test: 5 additional boot events alternating between
      # power-cycle restarts and Tasmota software restarts.
      # Two QEMU instances each contribute one power-cycle + one software
      # restart (= 4 events); a final third instance adds one power-cycle
      # (= 5 total).
      # ------------------------------------------------------------------
      - name: Stress test – 5 boot events (alternating power cycle / software restart)
        run: |
          FAILED=0

          for ITER in 1 2; do
            BOOT_PC=$((2 + ITER * 2))   # power-cycle boot numbers: 4, 6
            BOOT_SW=$((BOOT_PC + 1))    # software-restart boot numbers: 5, 7
            PORT=$((18082 + ITER))      # ports 18083, 18084
            LOG="qemu_serial_${BOOT_PC}.log"

            echo ""; echo "=== Stress iter $ITER: power cycle (boot $BOOT_PC) + SW restart (boot $BOOT_SW) ==="
            > "$LOG"

            qemu-system-xtensa \
              -nographic -machine esp32 \
              -drive "file=qemu_image/tasmota32-qemu-flash.bin,if=mtd,format=raw" \
              -nic user,model=open_eth,hostfwd=tcp::${PORT}-:80 \
              -serial file:"$LOG" -monitor null 2>/dev/null &
            QEMU_PID=$!

            # ---- power-cycle boot ----
            TIMEOUT=60; ELAPSED=0
            while [ $ELAPSED -lt $TIMEOUT ]; do
              grep -q "Project tasmota" "$LOG" 2>/dev/null && break
              sleep 2; ELAPSED=$((ELAPSED + 2))
            done
            if ! grep -q "Project tasmota" "$LOG" 2>/dev/null; then
              echo "✗ Stress boot $BOOT_PC (PC) FAILED"
              kill "$QEMU_PID" 2>/dev/null || true
              FAILED=$((FAILED + 1)); continue
            fi
            TIMEOUT=60; ELAPSED=0
            while [ $ELAPSED -lt $TIMEOUT ]; do
              grep -qE "ETH:.*[Cc]onnected|ETH:.*IPv4|ETH:.*[Gg]ot.IP" "$LOG" 2>/dev/null && break
              sleep 2; ELAPSED=$((ELAPSED + 2))
            done
            if ! grep -qE "ETH:.*[Cc]onnected|ETH:.*IPv4|ETH:.*[Gg]ot.IP" "$LOG" 2>/dev/null; then
              echo "✗ Stress boot $BOOT_PC (PC) FAILED – Ethernet not up"
              kill "$QEMU_PID" 2>/dev/null || true
              FAILED=$((FAILED + 1)); continue
            fi
            echo "✓ Stress boot $BOOT_PC (power cycle) – Ethernet up"

            # ---- software restart ----
            sleep 2
            LINES_BEFORE=$(wc -l < "$LOG")
            curl -s --max-time 10 "http://localhost:${PORT}/cm?cmnd=Restart%201" || true

            TIMEOUT=90; ELAPSED=0
            while [ $ELAPSED -lt $TIMEOUT ]; do
              tail -n +$((LINES_BEFORE + 1)) "$LOG" 2>/dev/null \
                | grep -q "Project tasmota" && break
              sleep 2; ELAPSED=$((ELAPSED + 2))
            done
            if ! tail -n +$((LINES_BEFORE + 1)) "$LOG" 2>/dev/null \
                 | grep -q "Project tasmota"; then
              echo "✗ Stress boot $BOOT_SW (SW restart) FAILED – no reboot"
              kill "$QEMU_PID" 2>/dev/null || true
              FAILED=$((FAILED + 1)); continue
            fi
            TIMEOUT=60; ELAPSED=0
            while [ $ELAPSED -lt $TIMEOUT ]; do
              tail -n +$((LINES_BEFORE + 1)) "$LOG" 2>/dev/null \
                | grep -qE "ETH:.*[Cc]onnected|ETH:.*IPv4|ETH:.*[Gg]ot.IP" && break
              sleep 2; ELAPSED=$((ELAPSED + 2))
            done
            if ! tail -n +$((LINES_BEFORE + 1)) "$LOG" 2>/dev/null \
                 | grep -qE "ETH:.*[Cc]onnected|ETH:.*IPv4|ETH:.*[Gg]ot.IP"; then
              echo "✗ Stress boot $BOOT_SW (SW restart) FAILED – Ethernet not up"
              kill "$QEMU_PID" 2>/dev/null || true
              FAILED=$((FAILED + 1)); continue
            fi
            echo "✓ Stress boot $BOOT_SW (software restart) – Ethernet up"
            kill "$QEMU_PID" 2>/dev/null || true
          done

          # Final standalone power-cycle boot (boot 8).
          echo ""; echo "=== Stress: final power cycle (boot 8) ==="
          > qemu_serial_8.log
          qemu-system-xtensa \
            -nographic -machine esp32 \
            -drive "file=qemu_image/tasmota32-qemu-flash.bin,if=mtd,format=raw" \
            -nic user,model=open_eth,hostfwd=tcp::18085-:80 \
            -serial file:qemu_serial_8.log -monitor null 2>/dev/null &
          QEMU_PID=$!
          TIMEOUT=60; ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            grep -q "Project tasmota" qemu_serial_8.log 2>/dev/null && break
            sleep 2; ELAPSED=$((ELAPSED + 2))
          done
          BOOT_OK=0
          if grep -q "Project tasmota" qemu_serial_8.log 2>/dev/null; then
            TIMEOUT=60; ELAPSED=0
            while [ $ELAPSED -lt $TIMEOUT ]; do
              grep -qE "ETH:.*[Cc]onnected|ETH:.*IPv4|ETH:.*[Gg]ot.IP" qemu_serial_8.log 2>/dev/null && break
              sleep 2; ELAPSED=$((ELAPSED + 2))
            done
            grep -qE "ETH:.*[Cc]onnected|ETH:.*IPv4|ETH:.*[Gg]ot.IP" qemu_serial_8.log 2>/dev/null && BOOT_OK=1
          fi
          kill "$QEMU_PID" 2>/dev/null || true
          if [ "$BOOT_OK" -eq 1 ]; then
            echo "✓ Stress boot 8 (power cycle) – Ethernet up"
          else
            echo "✗ Stress boot 8 FAILED"; cat qemu_serial_8.log || true
            FAILED=$((FAILED + 1))
          fi

          if [ "$FAILED" -gt 0 ]; then
            echo ""; echo "✗ Stress test FAILED: $FAILED event(s) failed"
            exit 1
          fi
          echo ""; echo "✓ Stress test PASSED (5 boot events: 3 power cycles + 2 software restarts)"

      # ------------------------------------------------------------------
      # Safeboot OTA test
      #
      # The OTA data partition (0xe000, 8 KB) stores the currently active
      # OTA slot.  Filling it with 0xFF (erased flash state) causes the
      # ESP32 bootloader to fall back to the factory partition, which
      # holds the tasmota32-qemu-safeboot firmware.
      #
      # From safeboot we POST tasmota32-qemu.bin to the /u HTTP endpoint.
      # The safeboot firmware writes it to the app0 OTA slot and reboots.
      # We then verify that the main Tasmota firmware comes up and responds
      # to an HTTP Status 0 request.
      # ------------------------------------------------------------------
      - name: Safeboot OTA test
        run: |
          echo "=== Safeboot OTA test ==="

          # Create a safeboot-only image by resetting the OTA data to 0xFF.
          # OTA_DATA_OFFSET: 0xe000  (matches partition table entry for boot_app0)
          # OTA_DATA_SIZE:   8192    (2 × 4 KB sectors, erased state = 0xFF)
          # With all bytes 0xFF the ESP-IDF bootloader finds no valid OTA entry
          # and falls back to the factory partition (tasmota32-qemu-safeboot).
          cp qemu_image/tasmota32-qemu-flash.bin qemu_image/safeboot_test_image.bin
          python3 - <<'PYEOF'
          OTA_DATA_OFFSET = 0xe000
          OTA_DATA_SIZE   = 8192
          with open("qemu_image/safeboot_test_image.bin", "r+b") as f:
              f.seek(OTA_DATA_OFFSET)
              f.write(b"\xff" * OTA_DATA_SIZE)
          PYEOF
          echo "Safeboot image ready (OTA data cleared)"
          ls -lh qemu_image/safeboot_test_image.bin

          # Boot into safeboot.
          > qemu_serial_safeboot.log
          qemu-system-xtensa \
            -nographic -machine esp32 \
            -drive "file=qemu_image/safeboot_test_image.bin,if=mtd,format=raw" \
            -nic user,model=open_eth,hostfwd=tcp::18090-:80 \
            -serial file:qemu_serial_safeboot.log -monitor null 2>/dev/null &
          QEMU_PID=$!
          echo "QEMU PID: $QEMU_PID"

          # Wait for the safeboot HTTP server to become reachable (poll /
          # until any HTTP response is received).
          echo "Waiting for safeboot HTTP server (up to 90 s)..."
          TIMEOUT=90; ELAPSED=0; HTTP_UP=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            HTTP_CODE=$(curl -s --max-time 3 -o /dev/null -w "%{http_code}" \
              "http://localhost:18090/" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" != "000" ]; then
              HTTP_UP=1
              echo "Safeboot HTTP responded with code $HTTP_CODE"
              break
            fi
            sleep 2; ELAPSED=$((ELAPSED + 2))
          done
          if [ "$HTTP_UP" -eq 0 ]; then
            echo "✗ Safeboot HTTP server did not become reachable"
            kill "$QEMU_PID" 2>/dev/null || true; cat qemu_serial_safeboot.log; exit 1
          fi
          echo "✓ Safeboot is reachable"
          tail -20 qemu_serial_safeboot.log || true

          # Upload the OTA firmware via the safeboot /u endpoint.
          echo "Uploading tasmota32-qemu.bin via safeboot /u endpoint..."
          OTA_HTTP=$(curl -s --max-time 180 \
            -o /tmp/ota_response.html \
            -w "%{http_code}" \
            -F "update=@qemu_image/tasmota32-qemu.bin" \
            "http://localhost:18090/u" || echo "000")
          echo "OTA upload HTTP code: $OTA_HTTP"
          cat /tmp/ota_response.html || true; echo ""
          if [ "$OTA_HTTP" != "200" ]; then
            echo "✗ Safeboot OTA upload FAILED (HTTP $OTA_HTTP)"
            kill "$QEMU_PID" 2>/dev/null || true; cat qemu_serial_safeboot.log; exit 1
          fi
          echo "✓ OTA firmware uploaded"

          # After the upload the ESP32 reboots automatically.  Detect the
          # main firmware starting up (new 'Project tasmota' after OTA).
          LINES_POST_OTA=$(wc -l < qemu_serial_safeboot.log)
          echo "Waiting for main firmware to boot after OTA..."
          TIMEOUT=90; ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            tail -n +$((LINES_POST_OTA + 1)) qemu_serial_safeboot.log 2>/dev/null \
              | grep -q "Project tasmota" && break
            sleep 2; ELAPSED=$((ELAPSED + 2))
          done
          if ! tail -n +$((LINES_POST_OTA + 1)) qemu_serial_safeboot.log 2>/dev/null \
               | grep -q "Project tasmota"; then
            echo "✗ Main firmware did not boot after OTA"
            kill "$QEMU_PID" 2>/dev/null || true; cat qemu_serial_safeboot.log; exit 1
          fi
          echo "✓ Main firmware booted after OTA"

          # Wait for Ethernet in the main firmware.
          TIMEOUT=60; ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            tail -n +$((LINES_POST_OTA + 1)) qemu_serial_safeboot.log 2>/dev/null \
              | grep -qE "ETH:.*[Cc]onnected|ETH:.*IPv4|ETH:.*[Gg]ot.IP" && break
            sleep 2; ELAPSED=$((ELAPSED + 2))
          done
          if ! tail -n +$((LINES_POST_OTA + 1)) qemu_serial_safeboot.log 2>/dev/null \
               | grep -qE "ETH:.*[Cc]onnected|ETH:.*IPv4|ETH:.*[Gg]ot.IP"; then
            echo "✗ Ethernet did not come up after OTA reboot"
            kill "$QEMU_PID" 2>/dev/null || true; cat qemu_serial_safeboot.log; exit 1
          fi
          echo "✓ Ethernet up after OTA reboot"

          # Verify main firmware via HTTP Status 0.
          # Safeboot lacks the full command dispatcher; a valid JSON 'Status'
          # key in the response confirms the main firmware is running.
          sleep 5
          OTA_STATUS=$(curl -s --max-time 15 \
            -o /tmp/ota_status.json -w "%{http_code}" \
            "http://localhost:18090/cm?cmnd=Status%200" || echo "000")
          echo "HTTP Status 0 code: $OTA_STATUS"
          cat /tmp/ota_status.json || true; echo ""
          if [ "$OTA_STATUS" != "200" ] || ! grep -q '"Status"' /tmp/ota_status.json 2>/dev/null; then
            echo "✗ HTTP Status 0 FAILED after OTA (code=$OTA_STATUS)"
            kill "$QEMU_PID" 2>/dev/null || true; cat qemu_serial_safeboot.log; exit 1
          fi
          echo "✓ Main firmware responding to Status 0 – safeboot OTA test PASSED"

          kill "$QEMU_PID" 2>/dev/null || true
          echo "--- Last 30 lines of serial log ---"
          tail -30 qemu_serial_safeboot.log || true

      - name: Upload QEMU serial logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-serial-logs
          path: qemu_serial_*.log

  Release:
    needs: [test]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4
    - name: Download all Tasmota artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: tasmota*
        path: ./temp
    - name: Move files
      run: |
        mkdir -p ./release
        find ./temp -type f -exec cp -t ./release {} +
    - name: Display structure of downloaded files
      run: ls -R ./release/
    - name: Release
      uses: jason2866/action-gh-release@v1.2
      with:
        tag_name: ${{ github.run_number }}
        files: |
          ./release/tasmota*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

