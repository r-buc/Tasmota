name: Build_QEMU_ESP32

on:
  workflow_dispatch:      # Start a workflow manually
  push:
    branches: master
    paths-ignore:
    #- '.github/**'        # Ignore changes towards the .github directory
    - '**.md'             # Do not build if *.md files change
    - 'tasmota/berry/**'  # Ignore Berry examples
  pull_request:
    branches: master
    paths-ignore:
    #- '.github/**'
    - '**.md'
    - 'tasmota/berry/**'

# Ensures that only one deploy task per branch/environment will run at a time.
concurrency:
  group: qemu-${{ github.ref }}
  cancel-in-progress: true

# Espressif QEMU release used for the boot-smoke test.
# Binary asset naming: qemu-xtensa-softmmu-<VERSION_UNDERSCORED>-x86_64-linux-gnu.tar.xz
# Requires glibc >= 2.31; ubuntu-latest (24.04) ships glibc 2.39.
env:
  QEMU_RELEASE: esp-develop-9.2.2-20250228
  QEMU_VERSION: esp_develop_9.2.2_20250228

jobs:
  safeboot:
    runs-on: ubuntu-latest
    if: github.repository == 'r-buc/Tasmota'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: false
      - name: Install dependencies
        run: |
          uv pip install --system -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip
          cp ./platformio_override_sample.ini ./platformio_override.ini
      - name: Run PlatformIO (safeboot)
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: '1'
        run: platformio run -e tasmota32-safeboot
      - name: Upload safeboot artifact
        uses: actions/upload-artifact@v4
        with:
          name: tasmota32-safeboot
          path: ./build_output

  build-qemu-image:
    needs: safeboot
    runs-on: ubuntu-latest
    if: github.repository == 'r-buc/Tasmota'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: false
      - name: Install dependencies
        run: |
          uv pip install --system -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip
          cp ./platformio_override_sample.ini ./platformio_override.ini
      - name: Download safeboot firmware
        uses: actions/download-artifact@v4
        with:
          name: tasmota32-safeboot
          path: ./temp
      - name: Move safeboot files into place
        run: |
          mkdir -p ./firmware/firmware
          find ./temp -type f -exec cp -t ./firmware/firmware {} +
      - name: Run PlatformIO (tasmota32-qemu)
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: '1'
        # tasmota32-qemu is a QEMU-compatible variant of tasmota32.
        # It sets -DFIRMWARE_TASMOTA32_QEMU which disables WiFi init at
        # boot so the firmware can run on the Espressif QEMU ESP32 machine,
        # which does not emulate the ESP32 WiFi hardware.
        run: platformio run -e tasmota32-qemu
      - name: Collect QEMU binaries and create merged flash image
        run: |
          BUILD_DIR=".pio/build/tasmota32-qemu"
          mkdir -p qemu_image

          # PlatformIO's post_esp32.py already assembled a correct flash image
          # (firmware.factory.bin) with the right partition layout:
          #   0x1000  - bootloader
          #   0x8000  - partition table
          #   0xe000  - boot_app0 (OTA data, selects factory partition on first boot)
          #   0x10000 - safeboot firmware (factory app partition)
          #   0xe0000 - main firmware (app0 partition; compiled to run from here)
          #
          # Placing firmware.bin at any other offset (e.g. 0x10000) causes an
          # immediate SW_RESET loop because the ESP32 MMU maps the booted partition
          # to a fixed virtual-address window and the XIP code pointers would be wrong.
          #
          # Pad the image to exactly 4 MB with 0xFF (erased-flash value) so that
          # QEMU's MTD flash device gets the full 4 MB it expects.
          python3 - <<'PYEOF'
import os, sys
BUILD_DIR = ".pio/build/tasmota32-qemu"
src = f"{BUILD_DIR}/firmware.factory.bin"
dst = "qemu_image/tasmota32-qemu-flash.bin"
target = 4 * 1024 * 1024
if not os.path.exists(src):
    print(f"ERROR: {src} not found", file=sys.stderr)
    sys.exit(1)
with open(src, "rb") as f:
    data = f.read()
if len(data) < target:
    data = data + b"\xff" * (target - len(data))
elif len(data) > target:
    print(f"ERROR: factory image {len(data)} bytes exceeds 4 MB flash", file=sys.stderr)
    sys.exit(1)
with open(dst, "wb") as f:
    f.write(data)
print(f"Flash image written: {len(data)} bytes ({len(data) // 1024} KB)")
PYEOF

          echo "=== QEMU image contents ==="
          ls -lh qemu_image/
      - name: Install Espressif QEMU
        run: |
          # Install runtime libraries required by the Espressif QEMU binary.
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-0 libpixman-1-0 libsdl2-2.0-0 libslirp0

          # Download the pre-built xtensa-softmmu binary from the official
          # Espressif QEMU release.  The archive extracts to qemu/bin/qemu-system-xtensa.
          curl -L -o /tmp/qemu-esp32.tar.xz \
            "https://github.com/espressif/qemu/releases/download/${{ env.QEMU_RELEASE }}/qemu-xtensa-softmmu-${{ env.QEMU_VERSION }}-x86_64-linux-gnu.tar.xz"
          tar -xf /tmp/qemu-esp32.tar.xz -C /tmp
          echo "/tmp/qemu/bin" >> "$GITHUB_PATH"

          /tmp/qemu/bin/qemu-system-xtensa --version
      - name: Boot test in QEMU
        run: |
          echo "Starting Tasmota in QEMU (boot smoke test)..."

          # Run QEMU in the background.
          # Neither WiFi nor the built-in ESP32 EMAC can be used here:
          # - WiFi hardware is not emulated by the ESP32 QEMU machine.
          # - QEMU's OpenCores Ethernet MAC is incompatible with the Synopsys
          #   GMAC register layout used by the ESP-IDF EMAC driver; attempting
          #   to initialise it causes a LoadStorePIFAddrError panic.
          # The FIRMWARE_TASMOTA32_QEMU flag disables both, so we test boot
          # stability only (no networking).
          qemu-system-xtensa \
            -nographic \
            -machine esp32 \
            -drive "file=qemu_image/tasmota32-qemu-flash.bin,if=mtd,format=raw" \
            -serial file:qemu_serial.log \
            -monitor null \
            2>/dev/null &
          QEMU_PID=$!
          echo "QEMU PID: $QEMU_PID"

          # --- Step 1: wait for Tasmota to reach main init (up to 60 s) ---
          echo "Waiting for Tasmota to reach main init..."
          TIMEOUT=60
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            if grep -q "Project tasmota" qemu_serial.log 2>/dev/null; then
              break
            fi
            sleep 2
            ELAPSED=$((ELAPSED + 2))
          done

          if ! grep -q "Project tasmota" qemu_serial.log 2>/dev/null; then
            echo "✗ Boot test FAILED – 'Project tasmota' not found after ${TIMEOUT}s"
            kill "$QEMU_PID" 2>/dev/null || true
            cat qemu_serial.log || true
            exit 1
          fi
          echo "✓ Boot PASSED – Tasmota reached main init"

          # --- Step 2: confirm no crash loop in the next 20 s ---
          # A crash loop prints "rst:0xc (SW_CPU_RESET)" repeatedly.
          # Count occurrences before and after a 20 s wait.
          # Use `; true` so the subshell always exits 0 (grep -c exits 1 for
          # zero matches but still prints "0", so `|| echo 0` would print "0\n0").
          REBOOTS_AT_BOOT=$(grep -c "rst:0xc" qemu_serial.log 2>/dev/null; true)
          REBOOTS_AT_BOOT="${REBOOTS_AT_BOOT:-0}"
          sleep 20
          REBOOTS_AFTER=$(grep -c "rst:0xc" qemu_serial.log 2>/dev/null; true)
          REBOOTS_AFTER="${REBOOTS_AFTER:-0}"

          kill "$QEMU_PID" 2>/dev/null || true

          if [ "$REBOOTS_AFTER" -gt "$REBOOTS_AT_BOOT" ]; then
            echo "✗ Stability test FAILED – firmware crashed after boot ($REBOOTS_AFTER SW_CPU_RESETs)"
            cat qemu_serial.log || true
            exit 1
          fi
          echo "✓ Stability PASSED – no crash loop after boot"

          echo ""
          echo "--- QEMU serial output (last 40 lines) ---"
          tail -40 qemu_serial.log || true
      - name: Zip QEMU image
        run: |
          cd qemu_image
          zip ../tasmota-qemu-esp32-image.zip ./*
      - name: Upload QEMU image artifact
        uses: actions/upload-artifact@v4
        with:
          name: tasmota-qemu-esp32-image
          path: tasmota-qemu-esp32-image.zip

